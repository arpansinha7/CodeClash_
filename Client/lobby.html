<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room-Selection</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <section id="Create-Room">
        <div class="container">
            <div class="card">
                <h1 class="new-room-head">Create A Room</h1>
                <input class="name-input" placeholder="Your Name :" required>
                <div class="btn-group">
                    <button id="generate-room" class="btn create">Generate Room</button>
                </div>
            </div>
        </div>
    </section>

    <section id="Join-Room">
        <div class="container">
            <div class="card">
                <h1 class="new-room-head">Join A Room</h1>
                <input type="text" class="name-input" placeholder="Your Name :" required>
                
                <input type="text" oninput="this.value = this.value.toUpperCase()" class="name-input" placeholder="Room Code :" required>
                <div class="btn-group">
                    <button class="btn join">Join Room</button>
                </div>
            </div>
        </div>
    </section>

    <section id="Waiting-Lobby">
        <div class="container">
            <div class="card">
                <h2>Room Code : <span id="roomCode">AB12CD</span></h2>
                <p>Waiting for players to join...</p>

                <ul id="players">
                    <li>Player1</li>
                    <li>Player2</li>
                </ul>

                <button class="btn create">Start Game</button>
            </div>
        </div>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/lobby.js"></script>
    
</body>
</html>
